name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:

  # ──────────────────────────────────────────────
  # JOB 1 – BUILD
  # ──────────────────────────────────────────────

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore unit-testing-using-dotnet-test.sln

      - name: Build
        run: dotnet build unit-testing-using-dotnet-test.sln --configuration Release --no-restore

  # ──────────────────────────────────────────────
  # JOB 2 – TEST
  # ──────────────────────────────────────────────

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore unit-testing-using-dotnet-test.sln

      - name: Test
        run: |
          dotnet test unit-testing-using-dotnet-test.sln \
            --configuration Release \
            --no-restore \
            --logger "trx;LogFileName=TestResults.trx" \
            --results-directory ./TestResults

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: ./TestResults/**/*.trx
          reporter: dotnet-trx
          token: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # JOB 3 – DEPLOY PLACEHOLDER 
  # ──────────────────────────────────────────────

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deployment placeholder
        run: |
          echo "TODO – Deployment"
          echo "Run #${{ github.run_number }} on ${{ github.ref_name }} by ${{ github.actor }}"