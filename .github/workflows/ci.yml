name: CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:

  # ──────────────────────────────────────────────
  # JOB 1 – BUILD
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

  # ──────────────────────────────────────────────
  # JOB 2 – TEST
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Run unit tests
        run: |
          dotnet test --configuration Release \
            --no-restore \
            --logger "trx;LogFileName=TestResults.trx" \
            --results-directory ./TestResults

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: ./TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

  # ──────────────────────────────────────────────
  # JOB 3 – DEPLOY PLACEHOLDER (scripted)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Write TODO deployment message
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          echo "=============================================="
          echo "TODO – Deployment"
          echo "=============================================="
          echo ""
          echo "This stage is a placeholder."
          echo "A deployment step should be implemented here,"
          echo "e.g. publishing to an Azure App Service,"
          echo "pushing a Docker image, or deploying via Helm."
          echo ""
          echo "Build number : ${{ github.run_number }}"
          echo "Branch       : ${{ github.ref_name }}"
          echo "Triggered by : ${{ github.actor }}"
          echo "Timestamp    : $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
