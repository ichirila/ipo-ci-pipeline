trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  testResultsDir: '$(Agent.TempDirectory)/TestResults'

stages:

  # ──────────────────────────────────────────────
  # STAGE 1 – BUILD
  # ──────────────────────────────────────────────

  - stage: Build
    displayName: 'Build'
    jobs:
      - job: BuildJob
        displayName: 'Restore and build'
        steps:
          - task: UseDotNet@2
            displayName: 'Use .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '10.x'

          - task: DotNetCoreCLI@2
            displayName: 'Restore'
            inputs:
              command: 'restore'
              projects: '**/*.csproj'

          - task: DotNetCoreCLI@2
            displayName: 'Build'
            inputs:
              command: 'build'
              projects: '**/*.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore'

  # ──────────────────────────────────────────────
  # STAGE 2 – TEST
  # ──────────────────────────────────────────────

  - stage: Test
    displayName: 'Test'
    dependsOn: Build
    jobs:
      - job: UnitTestJob
        displayName: 'Run unit tests'
        steps:
          - task: UseDotNet@2
            displayName: 'Use .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '10.x'

          - task: DotNetCoreCLI@2
            displayName: 'Restore'
            inputs:
              command: 'restore'
              projects: '**/*.csproj'

          - task: DotNetCoreCLI@2
            displayName: 'Test'
            inputs:
              command: 'test'
              projects: '**/*Tests*.csproj'
              arguments: >-
                --configuration $(buildConfiguration)
                --no-restore
                --logger "trx;LogFileName=TestResults.trx"
                --results-directory "$(testResultsDir)"
              publishTestResults: false

          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: always()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '$(testResultsDir)/**/*.trx'
              mergeTestResults: true
              failTaskOnFailedTests: true
              testRunTitle: 'Unit Tests - $(Build.BuildNumber)'

  # ──────────────────────────────────────────────
  # STAGE 3 – DEPLOYMENT PLACEHOLDER 
  # ──────────────────────────────────────────────

  - stage: Deploy
    displayName: 'Deploy'
    dependsOn: Test
    jobs:
      - job: DeployPlaceholderJob
        displayName: 'Deployment placeholder'
        steps:
          - task: Bash@3
            displayName: 'Deployment placeholder'
            inputs:
              targetType: 'inline'
              script: |
                echo "TODO – Deployment"
                echo "Build $(Build.BuildNumber) on $(Build.SourceBranchName) by $(Build.RequestedFor)"